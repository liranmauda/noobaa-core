name: Build Images
on: [push, pull_request]

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: GitHub Container Registry Login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build Builder
        run: |
          docker pull ghcr.io/noobaa/noobaa-builder:latest
          make builder
          docker tag noobaa-builder ghcr.io/noobaa/noobaa-builder
          docker push ghcr.io/noobaa/noobaa-builder:latest
      - name: Build Base
        run: |
          docker pull ghcr.io/noobaa/noobaa-base:latest
          make base
          docker tag noobaa-base ghcr.io/noobaa/noobaa-base
          docker push ghcr.io/noobaa/noobaa-base:latest
      